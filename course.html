<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Уроки — Harness Engineering</title>
  <link rel="stylesheet" href="assets/site.css" />
</head>
<body data-page="course">
  <div class="site-shell">
    <nav class="site-nav">
      <a href="index.html" data-nav="trainer">Тренажер</a>
      <a href="simple-words.html" data-nav="simple">Простими словами</a>
      <a href="course.html" data-nav="course">Уроки</a>
      <a href="cheatsheet.html" data-nav="cheats">Шпаргалка</a>
      <span class="spacer"></span>
      <a href="standart.html" data-nav="standart">STANDART</a>
    </nav>

    <header class="site-header">
      <h1>Уроки Markdown</h1>
      <p class="lead">12 уроків від «простими словами» до harness 2026. Почни з уроку 0, якщо вперше в kit.</p>
    </header>

    <div class="doc-layout">
      <aside class="doc-sidebar">
        <h2>Зміст курсу</h2>
        <nav id="lessonNav"></nav>
        <div class="side-divider">
          <a class="side-link" href="simple-words.html">Простими словами</a>
          <a class="side-link" href="index.html">← Тренажер</a>
        </div>
      </aside>
      <article class="doc-panel">
        <div id="content" class="doc-content"><p class="loading">Завантаження…</p></div>
      </article>
    </div>
  </div>

  <script src="content.js"></script>
  <script src="assets/marked.min.js"></script>
  <script src="assets/render-md.js"></script>
  <script src="assets/nav.js"></script>
  <script>
    const LESSONS = [
      { file: "lessons/00-simple-words.md", title: "0. Простими словами" },
      { file: "lessons/01-harness-mindset.md", title: "1. Harness mindset" },
      { file: "lessons/02-folder-structure.md", title: "2. Структура MIN" },
      { file: "lessons/03-twelve-rules.md", title: "3. 12 правил" },
      { file: "lessons/04-bootstrap-mode-a.md", title: "4. Bootstrap A" },
      { file: "lessons/05-session-harness.md", title: "5. Session harness" },
      { file: "lessons/06-tasks-protocol.md", title: "6. TASKS" },
      { file: "lessons/07-work-modes-safety.md", title: "7. WORK_MODES" },
      { file: "lessons/08-migration-mode-b.md", title: "8. Migration B" },
      { file: "lessons/09-agent-memory.md", title: "9. Agent memory" },
      { file: "lessons/10-signoff-demo.md", title: "10. Sign-off" },
      { file: "lessons/11-harness-2026-context.md", title: "11. Harness 2026 ★" }
    ];

    const nav = document.getElementById("lessonNav");
    nav.innerHTML = LESSONS.map(l =>
      `<a href="#" class="side-link" data-file="${l.file}">${l.title}</a>`
    ).join("");

    function loadLesson(file) {
      nav.querySelectorAll("a").forEach(a => a.classList.toggle("active", a.dataset.file === file));
      const md = typeof LESSON_MD !== "undefined" ? LESSON_MD[file] : null;
      renderMarkdown(md, document.getElementById("content"), { demoteH1: true });
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    nav.querySelectorAll("a[data-file]").forEach(a => {
      a.addEventListener("click", e => {
        e.preventDefault();
        loadLesson(a.dataset.file);
        history.replaceState(null, "", "?lesson=" + encodeURIComponent(a.dataset.file));
      });
    });

    const q = new URLSearchParams(location.search).get("lesson");
    const initial = q && LESSON_MD && LESSON_MD[q] ? q : LESSONS[0].file;
    loadLesson(initial);
  </script>
</body>
</html>
