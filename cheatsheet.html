<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Шпаргалка — Harness Engineering</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    :root { --bg: #0c0e14; --panel: #141820; --border: #2a3142; --text: #e8ecf4; --muted: #8b95a8; --accent: #7c6bf0; --green: #3fb950; --font: "SF Mono", Menlo, Consolas, monospace; }
    body { margin: 0; background: var(--bg); color: var(--text); font-family: Inter, system-ui, sans-serif; }
    .top { padding: 16px 24px; border-bottom: 1px solid var(--border); display: flex; gap: 12px; flex-wrap: wrap; }
    .top a { color: var(--muted); text-decoration: none; font-size: 0.86rem; }
    .top a:hover { color: var(--accent); }
    main { padding: 24px 32px 48px; max-width: 900px; margin: 0 auto; }
    main code { font-family: var(--font); background: #0c0e14; padding: 2px 6px; border-radius: 4px; color: var(--green); }
    main pre { background: #0c0e14; border: 1px solid var(--border); padding: 14px; border-radius: 8px; overflow-x: auto; }
  </style>
</head>
<body>
  <div class="top">
    <a href="index.html">← Тренажер</a>
    <a href="course.html">Уроки</a>
  </div>
  <main id="content">Завантаження…</main>
  <script src="content.js"></script>
  <script>
    document.getElementById("content").innerHTML = marked.parse(
      typeof CHEATSHEET_MD !== "undefined" ? CHEATSHEET_MD : "# Помилка\nЗапустіть `node scripts/build-content.js`."
    );
  </script>
</body>
</html>
